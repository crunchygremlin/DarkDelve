display:
  fps_cap: 60
  fullscreen: false
  height: 50
  renderer: console
  tileset: proper_ascii_tileset.png
  width: 120
dungeon:
  branches:
  - depth_range:
    - 1
    - 15
    id: main
    name: The Dungeon
    tile_set: stone
  - depth_range:
    - 10
    - 20
    id: catacombs
    name: Catacombs
    tile_set: crypt
    unlock_flag: found_catacombs
  - depth_range:
    - 20
    - 26
    id: abyss
    name: The Abyss
    tile_set: abyssal
    unlock_flag: defeated_catacombs_boss
  height: 43
  max_depth: 26
  max_rooms: 12
  room_max_size: 14
  room_min_size: 6
  width: 80
game:
  name: DarkDelve
  seed: null
  version: 1.0.0
gameplay:
  base_nutrition_per_turn: 1
  hunger_enabled: true
  identification_enabled: true
  max_nutrition: 2000
  permadeath: true
  score_on_quit: true
  starving_threshold: 200
llm:
  auto_pull_model: true
  cache_enabled: true
  fallback_enabled: true
  model: qwen2.5-coder:7b-instruct
  num_predict: 1024
  temperature: 0.7
  timeout: 30
  top_p: 0.9
playtest:
  config_path: playtest/playtest_config.yaml
  enabled: false
difficulty:
  default: normal
  scaling:
    story: 0.5
    normal: 1.0
    hard: 1.5
    nightmare: 2.0
    ironman: 3.0
durability:
  base:
    sword: 100
    axe: 120
    mace: 150
    dagger: 60
    spear: 80
    bow: 70
    shield: 200
    potion: 1
    wand: 30
    ring: 999
    amulet: 999
    scroll: 1
  hit_loss: 1
  block_loss: 3
  crit_loss: 5
  degradation_threshold: 0.5
  repair_stations:
  - shrine
  - forge

dungeon_master:
  enabled: true
  model: "gpt-oss"
  temperature: 0.7
  ollama_endpoint: "http://localhost:11434"
  log_path: "logs/llm_activity.json"
  max_calls_per_turn: 5
  enable_behavior_generation: true
  enable_level_design: false
damage:
  critical_multiplier: 1.5
  armor_minimum: 1
  resistance_default: 0.0

# Floor 1 (Dungeon Entrance) Configuration
floor1:
  corpse_chance: 0.5
  guard_patrol_count: 3
  den_count: 4
  roaming_creature_count: 5
  main_path_width: 3
  guard_group_size:
  - 2
  - 3
  den_group_size:
  - 2
  - 4
  cleanup_crew_threshold: 3
