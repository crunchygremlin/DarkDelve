version: '3.8'
services:
  ollama:
    image: ollama/ollama:latest # Placeholder image — replace with your Ollama image or remove if you run Ollama separately
    ports:
      - "11434:11434"
    restart: unless-stopped

  game:
    build: .
    volumes:
      - ./:/app
    environment:
      - LOCAL_LLM_ENDPOINT=http://ollama:11434/api/generate
    depends_on:
      - ollama
    tty: true
    stdin_open: true
